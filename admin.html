<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ShopLedger Admin | TeaJay Konsult</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#fdf8f4">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fdf8f4; color: #1e293b; padding-bottom: 90px; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .tab-bar { display: flex; flex-wrap: wrap; gap: 4px; background: white; border-radius: 40px; padding: 4px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: sticky; top: 10px; z-index: 100; }
    .tab-btn { flex: 1; text-align: center; padding: 10px 0; border-radius: 32px; font-weight: 600; background: transparent; border: none; cursor: pointer; color: #64748b; font-size: 12px; }
    .tab-btn.active { background: #ff7e9e; color: white; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid #f0e6df; }
    .card-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat-card { background: #fff0e6; border-radius: 20px; padding: 16px; text-align: center; }
    .stat-value { font-size: 28px; font-weight: 700; color: #ff7e9e; }
    .alert-badge { background: #fee2e2; color: #dc2626; border-radius: 40px; padding: 6px 12px; font-size: 12px; display: inline-block; }
    .icon-btn { background: none; border: none; font-size: 18px; cursor: pointer; }
    .product-item, .category-item, .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0e6df; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
    .modal.active { display: flex; }
    .modal-content { background: white; border-radius: 24px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; padding: 24px; }
    .receipt-preview { background: white; border-radius: 16px; padding: 20px; font-family: monospace; white-space: pre-wrap; border: 1px solid #e2e8f0; font-size: 12px; }
    .btn { width: 100%; padding: 12px; border-radius: 40px; font-weight: 600; cursor: pointer; border: none; margin-top: 8px; }
    .btn-primary { background: #ff7e9e; color: white; }
    .btn-outline { background: transparent; border: 1px solid #ff7e9e; color: #ff7e9e; }
    .flex { display: flex; gap: 8px; flex-wrap: wrap; }
    .input-field { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 20px; margin-bottom: 12px; }
    .welcome-section { background: #fff0e6; border-radius: 20px; padding: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .logo-preview { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; }
    footer { text-align: center; font-size: 11px; color: #64748b; margin-top: 24px; }
    .chart-container { height: 200px; margin-bottom: 20px; }
    .report-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0e6df; }
    .small-text { font-size: 12px; color: #64748b; }
    .settings-row { margin-bottom: 16px; }
    .settings-label { font-weight: 600; margin-bottom: 4px; }
  </style>
</head>
<body>
<div id="appRoot"></div>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyAEV8gjcAv4wTcMwzS9ddm-ooPC8dhBj8Y",
    authDomain: "shopledger-6e10c.firebaseapp.com",
    projectId: "shopledger-6e10c",
    storageBucket: "shopledger-6e10c.firebasestorage.app",
    messagingSenderId: "693117040596",
    appId: "1:693117040596:web:799e63124085d9a91c0841"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();

  let currentUser = null;
  let userRole = null;
  let businessSettings = null;
  let storeAdminId = null;

  function formatMoney(amount) {
    return '₦' + Number(amount).toLocaleString('en-NG', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }
  function formatDateTime() {
    return new Date().toLocaleString('en-NG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }
  function showModal(id) { document.getElementById(id)?.classList.add('active'); }
  function closeModal(id) { document.getElementById(id)?.classList.remove('active'); }
  window.showModal = showModal; window.closeModal = closeModal;

  // Business setup
  async function showBusinessSetup() {
    const root = document.getElementById('appRoot');
    root.innerHTML = `
      <div class="container">
        <div class="card">
          <h2 style="margin-bottom: 16px;">Business Setup Required</h2>
          <p style="margin-bottom: 20px;">Please enter your store details to continue.</p>
          <div class="flex" style="justify-content:center; margin-bottom:16px">
            <img id="setupLogoPreview" class="logo-preview" style="display:none">
            <button id="setupUploadLogoBtn" class="btn-outline" style="width:auto; padding:8px 16px">Upload Logo</button>
            <input type="file" id="setupLogoFile" accept="image/*" style="display:none">
          </div>
          <div><label>Business Name</label><input type="text" id="setupBizName" class="input-field" placeholder="Your store name"></div>
          <div><label>Phone Number</label><input type="tel" id="setupBizPhone" class="input-field" placeholder="08012345678"></div>
          <div><label>Address (including state)</label><textarea id="setupBizAddress" rows="2" class="input-field" placeholder="e.g. 12 Main Street, Lagos"></textarea></div>
          <button id="completeSetupBtn" class="btn btn-primary">Complete Setup</button>
          <div id="setupError" class="small-text" style="color:#dc2626"></div>
        </div>
      </div>
    `;
    let tempLogoURL = null;
    const uploadBtn = document.getElementById('setupUploadLogoBtn');
    const fileInput = document.getElementById('setupLogoFile');
    const preview = document.getElementById('setupLogoPreview');
    uploadBtn.onclick = () => fileInput.click();
    fileInput.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const ref = storage.ref(`logos/${storeAdminId}`);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        tempLogoURL = url;
        preview.src = url;
        preview.style.display = 'block';
      } catch(err) { document.getElementById('setupError').innerText = 'Logo upload failed: ' + err.message; }
    };
    document.getElementById('completeSetupBtn').onclick = async () => {
      const name = document.getElementById('setupBizName').value.trim();
      const phone = document.getElementById('setupBizPhone').value.trim();
      const address = document.getElementById('setupBizAddress').value.trim();
      if (!name || !phone || !address) {
        document.getElementById('setupError').innerText = 'Please fill all fields';
        return;
      }
      try {
        const updateData = { name, phone, address };
        if (tempLogoURL) updateData.logoURL = tempLogoURL;
        await db.collection('settings').doc(storeAdminId).set(updateData, { merge: true });
        window.location.reload();
      } catch(err) {
        document.getElementById('setupError').innerText = 'Save failed: ' + err.message;
      }
    };
  }

  // Main dashboard
  async function showAdminDashboard() {
    storeAdminId = storeAdminId || currentUser.uid;
    const root = document.getElementById('appRoot');
    root.innerHTML = `
      <div class="container">
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
          <button class="tab-btn" data-tab="inventory">📦 Inventory</button>
          <button class="tab-btn" data-tab="pos">🛒 POS</button>
          <button class="tab-btn" data-tab="expenses">💰 Expenses</button>
          <button class="tab-btn" data-tab="staff">👥 Staff</button>
          <button class="tab-btn" data-tab="reports">📈 Reports</button>
          <button class="tab-btn" data-tab="settings">⚙️ Settings</button>
        </div>

        <div id="dashboardTab" class="tab-pane active">
          <div id="welcomeSection" class="welcome-section"></div>
          <div class="card"><div class="card-title">Today's Summary</div><div class="stat-grid"><div class="stat-card"><div class="stat-value" id="todaySales">₦0</div><div class="stat-label">Sales</div></div><div class="stat-card"><div class="stat-value" id="todayProfit">₦0</div><div class="stat-label">Profit</div></div></div></div>
          <div class="card"><div class="card-title">Low Stock (<10)</div><div id="lowStockList"></div></div>
          <div class="card"><div class="card-title">Quick Actions</div><div class="flex"><button onclick="showModal('addProductModal')" class="btn btn-primary">➕ Add Product</button><button onclick="showModal('addCategoryModal')" class="btn btn-outline">📁 Add Category</button></div></div>
        </div>

        <div id="inventoryTab" class="tab-pane">
          <div class="card"><div class="card-title">Categories <button onclick="showModal('addCategoryModal')" class="icon-btn">➕</button></div><div id="categoriesList"></div></div>
          <div class="card"><div class="card-title">Products <button onclick="showModal('addProductModal')" class="icon-btn">➕</button></div><div id="productsList"></div></div>
        </div>

        <div id="posTab" class="tab-pane">
          <div class="card"><div class="card-title">Shopping Cart</div><div id="cartItems"></div><div class="mt-2"><strong>Total: </strong><span id="cartTotal">₦0</span></div><button id="checkoutBtn" class="btn btn-primary mt-2">Checkout</button></div>
          <div class="card"><div class="card-title">Products</div><input type="text" id="searchProduct" placeholder="Search..." class="input-field"><div id="productListPos" style="max-height:300px; overflow:auto"></div></div>
        </div>

        <div id="expensesTab" class="tab-pane">
          <div class="card"><div class="card-title">Add Expense <button onclick="showModal('addExpenseModal')" class="icon-btn">➕</button></div><div id="expensesList"></div></div>
        </div>

        <div id="staffTab" class="tab-pane">
          <div class="card"><div class="card-title">Invite Cashier</div><input type="email" id="inviteEmail" placeholder="cashier@example.com" class="input-field"><button id="inviteBtn" class="btn btn-primary">Send Invitation</button><div id="inviteMsg" class="mt-2 small-text"></div></div>
          <div class="card"><div class="card-title">Current Cashiers</div><div id="cashiersList"></div></div>
        </div>

        <div id="reportsTab" class="tab-pane">
          <div class="card"><div class="card-title">Monthly Sales (Last 6 Months)</div><div class="chart-container"><canvas id="salesChart"></canvas></div></div>
          <div class="card"><div class="card-title">Monthly Summary (Income vs Expenses)</div><div class="chart-container"><canvas id="monthlySummaryChart"></canvas></div><div id="monthlySummaryTable" class="mt-2"></div></div>
          <div class="card"><div class="card-title">Top Selling Products (This Month)</div><div id="topProductsList"></div></div>
          <div class="card"><div class="card-title">Profit by Product (This Month)</div><div id="profitByProductList"></div></div>
          <div class="card"><div class="card-title">Expense Breakdown</div><div class="chart-container"><canvas id="expenseChart"></canvas></div><div id="expenseBreakdownList" class="mt-2"></div></div>
          <div class="card"><div class="card-title">Export Data</div><div class="flex"><button id="exportSalesBtn" class="btn btn-outline">📥 Export Sales (CSV)</button><button id="exportExpensesBtn" class="btn btn-outline">📥 Export Expenses (CSV)</button></div></div>
        </div>

        <div id="settingsTab" class="tab-pane">
          <div class="card">
            <div class="card-title">Business Settings</div>
            <div class="flex" style="justify-content:center; margin-bottom:16px">
              <img id="settingsLogoPreview" class="logo-preview" style="display:none">
              <button id="settingsUploadLogoBtn" class="btn-outline" style="width:auto; padding:8px 16px">Upload Logo</button>
              <input type="file" id="settingsLogoFile" accept="image/*" style="display:none">
            </div>
            <div class="settings-row"><div class="settings-label">Business Name</div><input type="text" id="settingsBizName" class="input-field"></div>
            <div class="settings-row"><div class="settings-label">Phone Number</div><input type="tel" id="settingsBizPhone" class="input-field"></div>
            <div class="settings-row"><div class="settings-label">Address (including state)</div><textarea id="settingsBizAddress" rows="2" class="input-field"></textarea></div>
            <button id="saveSettingsBtn" class="btn btn-primary">Save Changes</button>
            <div id="settingsMsg" class="small-text mt-2"></div>
          </div>
        </div>
        <footer>© 2026 TeaJay Konsult Ltd.</footer>
      </div>

      <!-- Modals with inline onclick handlers -->
      <div id="addCategoryModal" class="modal">
        <div class="modal-content">
          <h3>Add Category</h3>
          <input type="text" id="catName" class="input-field" placeholder="Category name">
          <button onclick="saveCategory()" class="btn btn-primary">Save</button>
          <button onclick="closeModal('addCategoryModal')" class="btn btn-outline">Cancel</button>
        </div>
      </div>
      <div id="addProductModal" class="modal">
        <div class="modal-content">
          <h3>Add Product</h3>
          <input type="text" id="prodName" placeholder="Name" class="input-field">
          <select id="prodCategory" class="input-field"></select>
          <input type="number" id="prodCost" placeholder="Cost price" class="input-field">
          <input type="number" id="prodPrice" placeholder="Selling price" class="input-field">
          <input type="number" id="prodStock" placeholder="Initial stock" class="input-field">
          <input type="number" id="prodReorder" placeholder="Reorder level (default 10)" value="10" class="input-field">
          <button onclick="saveProduct()" class="btn btn-primary">Save</button>
          <button onclick="closeModal('addProductModal')" class="btn btn-outline">Cancel</button>
        </div>
      </div>
      <div id="addExpenseModal" class="modal">
        <div class="modal-content">
          <h3>Add Expense</h3>
          <input type="text" id="expenseName" placeholder="Title" class="input-field">
          <input type="number" id="expenseAmount" placeholder="Amount" class="input-field">
          <input type="text" id="expenseNote" placeholder="Note (optional)" class="input-field">
          <button onclick="saveExpense()" class="btn btn-primary">Save</button>
          <button onclick="closeModal('addExpenseModal')" class="btn btn-outline">Cancel</button>
        </div>
      </div>
      <div id="receiptModal" class="modal">
        <div class="modal-content">
          <h3>Receipt</h3>
          <div id="receiptPreview" class="receipt-preview"></div>
          <div class="flex">
            <button id="downloadPdfBtn" class="btn btn-primary">📄 Download PDF</button>
            <button id="shareReceiptBtn" class="btn btn-outline">📤 Share WhatsApp</button>
          </div>
          <button onclick="closeModal('receiptModal')" class="btn btn-outline mt-2">Close</button>
        </div>
      </div>
    `;

    // Global data
    let categories = [], products = [], cart = [], lowStockItems = [];
    let salesChart, monthlySummaryChart, expenseChart;

    // Helper functions
    async function loadCatalog() {
      const catsSnap = await db.collection('categories').where('storeId', '==', storeAdminId).get();
      categories = catsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      const prodsSnap = await db.collection('products').where('storeId', '==', storeAdminId).get();
      products = prodsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      lowStockItems = products.filter(p => p.stock <= (p.reorderLevel || 10));
    }

    function renderCategories() {
      const container = document.getElementById('categoriesList');
      if (!container) return;
      if (!categories.length) { container.innerHTML = '<div>No categories</div>'; return; }
      container.innerHTML = categories.map(c => `<div class="category-item"><span>${c.name}</span><button onclick="deleteCategory('${c.id}')" class="icon-btn">🗑️</button></div>`).join('');
    }
    function renderProducts() {
      const container = document.getElementById('productsList');
      if (!container) return;
      if (!products.length) { container.innerHTML = '<div>No products</div>'; return; }
      container.innerHTML = products.map(p => `<div class="product-item"><div><strong>${p.name}</strong><br>${p.category} | Stock: ${p.stock} | ₦${p.price}</div><button onclick="deleteProduct('${p.id}')" class="icon-btn">🗑️</button></div>`).join('');
    }
    function renderProductListPos() {
      const container = document.getElementById('productListPos');
      const term = document.getElementById('searchProduct')?.value.toLowerCase() || '';
      const filtered = products.filter(p => p.name.toLowerCase().includes(term));
      container.innerHTML = filtered.map(p => `<div class="product-item" onclick="addToCart('${p.id}')"><div><strong>${p.name}</strong><br>₦${p.price} | Stock: ${p.stock}</div><button class="icon-btn">➕</button></div>`).join('');
    }
    function renderLowStock() {
      const container = document.getElementById('lowStockList');
      if (!container) return;
      if (!lowStockItems.length) { container.innerHTML = '✅ All stocks above reorder level'; return; }
      container.innerHTML = lowStockItems.map(p => `<div class="alert-badge mb-1">⚠️ ${p.name} (${p.stock} left)</div>`).join('');
    }
    async function updateDashboard() {
      const today = new Date().toISOString().slice(0,10);
      const salesSnap = await db.collection('sales').where('storeId', '==', storeAdminId).where('date', '==', today).get();
      let totalSales = 0, totalProfit = 0;
      salesSnap.forEach(d => { totalSales += d.data().amount; totalProfit += d.data().profit; });
      const salesSpan = document.getElementById('todaySales');
      const profitSpan = document.getElementById('todayProfit');
      if (salesSpan) salesSpan.innerText = formatMoney(totalSales);
      if (profitSpan) profitSpan.innerText = formatMoney(totalProfit);
    }
    async function renderExpenses() {
      const snap = await db.collection('expenses').where('storeId', '==', storeAdminId).orderBy('timestamp', 'desc').get();
      const container = document.getElementById('expensesList');
      if (!container) return;
      if (snap.empty) { container.innerHTML = '<div>No expenses</div>'; return; }
      container.innerHTML = snap.docs.map(d => `<div class="product-item"><div><strong>${d.data().title}</strong><br>₦${d.data().amount} ${d.data().note ? `- ${d.data().note}` : ''}</div><button onclick="deleteExpense('${d.id}')" class="icon-btn">🗑️</button></div>`).join('');
    }
    async function renderCashiers() {
      if (userRole !== 'admin') return;
      const usersSnap = await db.collection('users').where('storeAdminId', '==', storeAdminId).where('role', '==', 'cashier').get();
      const container = document.getElementById('cashiersList');
      if (!container) return;
      if (usersSnap.empty) { container.innerHTML = '<div>No cashiers added yet.</div>'; return; }
      container.innerHTML = usersSnap.docs.map(d => `<div class="product-item"><div><strong>${d.data().email}</strong><br>Role: Cashier</div></div>`).join('');
    }
    function updateCategoryDropdown() {
      const select = document.getElementById('prodCategory');
      if (select) {
        select.innerHTML = '<option value="">Select category</option>';
        categories.forEach(cat => { select.innerHTML += `<option value="${cat.name}">${cat.name}</option>`; });
      }
    }
    async function refreshAll() {
      await loadCatalog();
      renderCategories();
      renderProducts();
      renderProductListPos();
      renderLowStock();
      updateDashboard();
      renderExpenses();
      renderCart();
      renderCashiers();
      updateCategoryDropdown();
      loadReports();
      loadSettingsIntoForm();
    }

    // CRUD operations (global for onclick)
    window.saveCategory = async () => {
      const name = document.getElementById('catName').value.trim();
      if (!name) return;
      await db.collection('categories').add({ storeId: storeAdminId, name });
      closeModal('addCategoryModal');
      document.getElementById('catName').value = '';
      await refreshAll();
    };
    window.deleteCategory = async (id) => {
      await db.collection('categories').doc(id).delete();
      await refreshAll();
    };
    window.saveProduct = async () => {
      const name = document.getElementById('prodName').value.trim();
      const category = document.getElementById('prodCategory').value;
      const cost = parseFloat(document.getElementById('prodCost').value);
      const price = parseFloat(document.getElementById('prodPrice').value);
      const stock = parseInt(document.getElementById('prodStock').value);
      const reorder = parseInt(document.getElementById('prodReorder').value) || 10;
      if (!name || !category || isNaN(cost) || isNaN(price)) return;
      await db.collection('products').add({ storeId: storeAdminId, name, category, cost, price, stock, reorderLevel: reorder });
      closeModal('addProductModal');
      document.getElementById('prodName').value = '';
      document.getElementById('prodCost').value = '';
      document.getElementById('prodPrice').value = '';
      document.getElementById('prodStock').value = '';
      document.getElementById('prodReorder').value = '10';
      await refreshAll();
    };
    window.deleteProduct = async (id) => {
      await db.collection('products').doc(id).delete();
      await refreshAll();
    };
    window.saveExpense = async () => {
      const title = document.getElementById('expenseName').value.trim();
      const amount = parseFloat(document.getElementById('expenseAmount').value);
      const note = document.getElementById('expenseNote').value;
      if (!title || isNaN(amount)) return;
      await db.collection('expenses').add({ storeId: storeAdminId, title, amount, note, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
      closeModal('addExpenseModal');
      document.getElementById('expenseName').value = '';
      document.getElementById('expenseAmount').value = '';
      document.getElementById('expenseNote').value = '';
      await refreshAll();
    };
    window.deleteExpense = async (id) => {
      await db.collection('expenses').doc(id).delete();
      await refreshAll();
    };

    // POS cart
    window.addToCart = (productId) => {
      const product = products.find(p => p.id === productId);
      if (!product || product.stock <= 0) return alert("Out of stock");
      const existing = cart.find(i => i.id === productId);
      if (existing) existing.qty++;
      else cart.push({ id: productId, name: product.name, price: product.price, qty: 1 });
      renderCart();
    };
    window.removeFromCart = (idx) => { cart.splice(idx,1); renderCart(); };
    function renderCart() {
      const container = document.getElementById('cartItems');
      const totalSpan = document.getElementById('cartTotal');
      if (!container) return;
      if (!cart.length) { container.innerHTML = '<div>Cart empty</div>'; if (totalSpan) totalSpan.innerText = '₦0'; return; }
      let html = '';
      cart.forEach((item, idx) => {
        html += `<div class="cart-item"><div>${item.name}<br>₦${item.price} x ${item.qty}</div><div><span>₦${item.price*item.qty}</span><button onclick="removeFromCart(${idx})" class="icon-btn ml-2">🗑️</button></div></div>`;
      });
      container.innerHTML = html;
      const total = cart.reduce((s,i)=>s+(i.price*i.qty),0);
      if (totalSpan) totalSpan.innerText = formatMoney(total);
    }
    document.getElementById('checkoutBtn')?.addEventListener('click', async () => {
      if (cart.length === 0) return alert("Cart empty");
      const total = cart.reduce((s,i)=>s+(i.price*i.qty),0);
      let profit = 0;
      for (let item of cart) {
        const prod = products.find(p => p.id === item.id);
        profit += (item.price - prod.cost) * item.qty;
      }
      const sale = {
        storeId: storeAdminId,
        userId: currentUser.uid,
        date: new Date().toISOString().slice(0,10),
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        items: cart.map(i => ({ id: i.id, name: i.name, qty: i.qty, price: i.price })),
        amount: total,
        profit: profit
      };
      await db.collection('sales').add(sale);
      for (let item of cart) {
        const prod = products.find(p => p.id === item.id);
        const newStock = prod.stock - item.qty;
        await db.collection('products').doc(item.id).update({ stock: newStock });
      }
      await refreshAll();
      cart = [];
      renderCart();
      await updateDashboard();
      generateReceipt(sale.items, total);
    });

    function generateReceipt(items, total) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      let y = 20;
      doc.setFontSize(16);
      doc.text(businessSettings?.name || "ShopLedger", 105, y, { align: "center" });
      y += 6;
      doc.setFontSize(9);
      if (businessSettings?.address) doc.text(businessSettings.address, 105, y, { align: "center" });
      y += 5;
      if (businessSettings?.phone) doc.text(`Tel: ${businessSettings.phone}`, 105, y, { align: "center" });
      y += 8;
      doc.setFontSize(10);
      doc.text(formatDateTime(), 105, y, { align: "center" });
      y += 8;
      doc.line(20, y, 190, y);
      y += 6;
      doc.text("Item", 20, y); doc.text("Qty", 85, y); doc.text("Price", 120, y); doc.text("Total", 160, y);
      y += 6;
      doc.line(20, y, 190, y);
      y += 4;
      for (let item of items) {
        const lineTotal = item.qty * item.price;
        doc.text(item.name.substring(0, 18), 20, y);
        doc.text(item.qty.toString(), 85, y);
        doc.text(`₦${item.price}`, 120, y);
        doc.text(`₦${lineTotal}`, 160, y);
        y += 6;
        if (y > 270) { doc.addPage(); y = 20; }
      }
      doc.line(20, y, 190, y);
      y += 8;
      doc.setFontSize(12);
      doc.text(`Total: ₦${total}`, 150, y);
      y += 12;
      doc.setFontSize(9);
      doc.text("ShopLedger · Developed by TeaJay Konsult Ltd", 105, y, { align: "center" });
      window.lastReceiptPdf = doc;
      let preview = `${businessSettings?.name || "ShopLedger"}\n${businessSettings?.address || ""}\n${businessSettings?.phone || ""}\n${formatDateTime()}\n${'-'.repeat(30)}\n`;
      for (let i of items) preview += `${i.name} x${i.qty} @₦${i.price} = ₦${i.qty*i.price}\n`;
      preview += `${'-'.repeat(30)}\nTotal: ₦${total}\nShopLedger · TeaJay Konsult`;
      const previewDiv = document.getElementById('receiptPreview');
      if (previewDiv) previewDiv.innerText = preview;
      showModal('receiptModal');
    }
    function downloadReceipt() { if (window.lastReceiptPdf) window.lastReceiptPdf.save(`receipt_${Date.now()}.pdf`); else alert("No receipt"); }
    function shareReceiptWhatsApp() { window.open(`https://wa.me/?text=${encodeURIComponent(document.getElementById('receiptPreview')?.innerText || '')}`, '_blank'); }
    document.getElementById('downloadPdfBtn')?.addEventListener('click', downloadReceipt);
    document.getElementById('shareReceiptBtn')?.addEventListener('click', shareReceiptWhatsApp);

    // Reports (placeholder)
    async function loadReports() {
      // You can implement full reports later
      const topDiv = document.getElementById('topProductsList');
      if (topDiv) topDiv.innerHTML = '<div class="small-text">Reports will appear here.</div>';
    }

    // Settings
    function loadSettingsIntoForm() {
      if (businessSettings) {
        const nameField = document.getElementById('settingsBizName');
        const phoneField = document.getElementById('settingsBizPhone');
        const addressField = document.getElementById('settingsBizAddress');
        const logoImg = document.getElementById('settingsLogoPreview');
        if (nameField) nameField.value = businessSettings.name || '';
        if (phoneField) phoneField.value = businessSettings.phone || '';
        if (addressField) addressField.value = businessSettings.address || '';
        if (logoImg && businessSettings.logoURL) {
          logoImg.src = businessSettings.logoURL;
          logoImg.style.display = 'block';
        }
      }
    }
    let tempLogoURL = null;
    document.getElementById('settingsUploadLogoBtn')?.addEventListener('click', () => document.getElementById('settingsLogoFile')?.click());
    document.getElementById('settingsLogoFile')?.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const ref = storage.ref(`logos/${storeAdminId}`);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        tempLogoURL = url;
        const preview = document.getElementById('settingsLogoPreview');
        if (preview) { preview.src = url; preview.style.display = 'block'; }
      } catch(err) { alert('Logo upload failed'); }
    });
    document.getElementById('saveSettingsBtn')?.addEventListener('click', async () => {
      const name = document.getElementById('settingsBizName')?.value.trim();
      const phone = document.getElementById('settingsBizPhone')?.value.trim();
      const address = document.getElementById('settingsBizAddress')?.value.trim();
      if (!name || !phone || !address) { alert('Please fill all fields'); return; }
      try {
        const updateData = { name, phone, address };
        if (tempLogoURL) updateData.logoURL = tempLogoURL;
        await db.collection('settings').doc(storeAdminId).set(updateData, { merge: true });
        const bizDoc = await db.collection('settings').doc(storeAdminId).get();
        businessSettings = bizDoc.data();
        tempLogoURL = null;
        const welcomeDiv = document.getElementById('welcomeSection');
        if (welcomeDiv && businessSettings.name) {
          welcomeDiv.innerHTML = `<img src="${businessSettings.logoURL || ''}" class="logo-preview" onerror="this.style.display='none'"><div><strong>Welcome, ${businessSettings.name}</strong><br>${formatDateTime()}</div>`;
        }
        const msgDiv = document.getElementById('settingsMsg');
        if (msgDiv) msgDiv.innerText = 'Settings saved!';
        setTimeout(() => { if (msgDiv) msgDiv.innerText = ''; }, 3000);
      } catch(err) { alert('Save failed: ' + err.message); }
    });

    // Staff invite
    document.getElementById('inviteBtn')?.addEventListener('click', async () => {
      const email = document.getElementById('inviteEmail')?.value.trim();
      if (!email) { inviteMsg.innerText = 'Enter email address'; return; }
      await db.collection('invitations').add({ email, role: 'cashier', storeAdminId, used: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      const msgDiv = document.getElementById('inviteMsg');
      if (msgDiv) msgDiv.innerText = `Invitation sent to ${email}`;
      document.getElementById('inviteEmail').value = '';
      setTimeout(() => { if (msgDiv) msgDiv.innerText = ''; }, 3000);
    });

    // Welcome section
    async function loadWelcome() {
      const welcomeDiv = document.getElementById('welcomeSection');
      if (welcomeDiv) {
        if (businessSettings && businessSettings.name) {
          welcomeDiv.innerHTML = `<img src="${businessSettings.logoURL || ''}" class="logo-preview" onerror="this.style.display='none'"><div><strong>Welcome, ${businessSettings.name}</strong><br>${formatDateTime()}</div>`;
        } else {
          welcomeDiv.innerHTML = `<div><strong>Welcome, Admin</strong><br>${formatDateTime()}</div>`;
        }
      }
    }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        const activePane = document.getElementById(tab + 'Tab');
        if (activePane) activePane.classList.add('active');
        if (tab === 'pos') renderProductListPos();
        if (tab === 'inventory') refreshAll();
        if (tab === 'expenses') renderExpenses();
        if (tab === 'staff') renderCashiers();
        if (tab === 'reports') loadReports();
        if (tab === 'settings') loadSettingsIntoForm();
      });
    });
    document.getElementById('searchProduct')?.addEventListener('input', () => renderProductListPos());

    await refreshAll();
    await loadWelcome();
    setInterval(updateDashboard, 10000);
  }

  // Initialize
  (async () => {
    function setupInstallButton() {
      if (document.getElementById('installBtn')) return;
      const style = document.createElement('style');
      style.textContent = `
        .perm-install-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #ff7e9e; color: white; border: none; border-radius: 40px; padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer; z-index: 1000; display: flex; gap: 6px; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .perm-install-btn:active { transform: translateX(-50%) scale(0.96); }
        .ios-banner { display: none; position: fixed; bottom: 80px; left: 16px; right: 16px; background: #fff0e6; border: 1px solid #ffb6c1; border-radius: 20px; padding: 12px; z-index: 1001; text-align: center; font-size: 13px; }
        .ios-banner strong { color: #ff7e9e; }
        .ios-close { position: absolute; right: 12px; top: 8px; background: none; border: none; font-size: 16px; cursor: pointer; }
      `;
      document.head.appendChild(style);
      document.body.insertAdjacentHTML('beforeend', `<button id="installBtn" class="perm-install-btn">📲 Install App</button>`);
      document.body.insertAdjacentHTML('beforeend', `<div id="iosBanner" class="ios-banner"><button class="ios-close" onclick="this.parentElement.style.display='none'">✕</button><strong>📲 Install ShopLedger</strong><br>Tap Share (⬆️) then "Add to Home Screen"</div>`);
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
      if (isIOS && !isStandalone) document.getElementById('iosBanner').style.display = 'block';
      let deferredPrompt = null;
      const installBtn = document.getElementById('installBtn');
      if (window.matchMedia('(display-mode: standalone)').matches && installBtn) installBtn.style.display = 'none';
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if (installBtn && !window.matchMedia('(display-mode: standalone)').matches) installBtn.style.display = 'flex';
      });
      window.addEventListener('appinstalled', () => { deferredPrompt = null; if (installBtn) installBtn.style.display = 'none'; });
      installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') installBtn.style.display = 'none';
          deferredPrompt = null;
        } else {
          alert("📲 Install: Use browser menu (⋮) → 'Add to Home Screen'.");
        }
      });
    }
    setupInstallButton();

    const user = await new Promise(resolve => {
      const unsubscribe = auth.onAuthStateChanged(u => { unsubscribe(); resolve(u); });
    });
    if (!user) { window.location.href = 'index.html'; return; }
    currentUser = user;
    const userDoc = await db.collection('users').doc(user.uid).get();
    if (userDoc.exists) {
      userRole = userDoc.data().role;
      storeAdminId = userDoc.data().storeAdminId || user.uid;
    } else {
      userRole = 'admin';
      storeAdminId = user.uid;
      await db.collection('users').doc(user.uid).set({ email: user.email, role: 'admin', storeAdminId: user.uid });
    }
    const settingsDoc = await db.collection('settings').doc(storeAdminId).get();
    businessSettings = settingsDoc.exists ? settingsDoc.data() : null;
    if (!businessSettings || !businessSettings.name) {
      showBusinessSetup();
    } else {
      await showAdminDashboard();
    }
  })();
</script>
