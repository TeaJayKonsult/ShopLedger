<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ShopLedger | Cashier POS</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#fdf8f4">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #fdf8f4;
      color: #1e293b;
      padding-bottom: 90px;
    }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .card {
      background: white;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #f0e6df;
    }
    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .stat-card {
      background: #fff0e6;
      border-radius: 20px;
      padding: 16px;
      text-align: center;
    }
    .stat-value { font-size: 28px; font-weight: 700; color: #ff7e9e; }
    .alert-badge {
      background: #fee2e2;
      color: #dc2626;
      border-radius: 40px;
      padding: 6px 12px;
      font-size: 12px;
      display: inline-block;
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
    }
    .product-item, .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0e6df;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 20px;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: white;
      border-radius: 24px;
      width: 100%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 24px;
    }
    .receipt-preview {
      background: white;
      border-radius: 16px;
      padding: 20px;
      font-family: monospace;
      white-space: pre-wrap;
      border: 1px solid #e2e8f0;
      font-size: 12px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      margin-top: 8px;
    }
    .btn-primary { background: #ff7e9e; color: white; }
    .btn-outline { background: transparent; border: 1px solid #ff7e9e; color: #ff7e9e; }
    .flex { display: flex; gap: 8px; flex-wrap: wrap; }
    .input-field { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 20px; margin-bottom: 12px; }
    .welcome-section {
      background: #fff0e6;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .logo-preview { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; margin-right: 12px; vertical-align: middle; }
    footer { text-align: center; font-size: 11px; color: #64748b; margin-top: 24px; }
  </style>
</head>
<body>
<div class="container">
  <div id="welcomeSection" class="welcome-section"></div>

  <div class="card">
    <div class="card-title">Today's Summary</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value" id="todaySales">₦0</div><div class="stat-label">Sales</div></div>
      <div class="stat-card"><div class="stat-value" id="todayProfit">₦0</div><div class="stat-label">Profit</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Low Stock (<10)</div>
    <div id="lowStockList"></div>
  </div>

  <div class="card">
    <div class="card-title">Shopping Cart</div>
    <div id="cartItems"></div>
    <div class="mt-2"><strong>Total: </strong><span id="cartTotal">₦0</span></div>
    <button id="checkoutBtn" class="btn btn-primary mt-2">Checkout</button>
  </div>

  <div class="card">
    <div class="card-title">Products</div>
    <input type="text" id="searchProduct" placeholder="Search product..." class="input-field">
    <div id="productListPos" style="max-height: 350px; overflow-y: auto;"></div>
  </div>

  <footer>© 2026 TeaJay Konsult Ltd. | Cashier Mode</footer>
</div>

<!-- Receipt Modal -->
<div id="receiptModal" class="modal">
  <div class="modal-content">
    <h3>Receipt</h3>
    <div id="receiptPreview" class="receipt-preview"></div>
    <div class="flex">
      <button id="downloadPdfBtn" class="btn btn-primary">📄 Download PDF</button>
      <button id="shareReceiptBtn" class="btn btn-outline">📤 Share WhatsApp</button>
    </div>
    <button onclick="closeModal('receiptModal')" class="btn btn-outline mt-2">Close</button>
  </div>
</div>

<script src="common.js"></script>
<script>
  // Global state
  let categories = [], products = [], cart = [], lowStockItems = [];
  let businessSettings = null;

  // DOM elements
  const welcomeDiv = document.getElementById('welcomeSection');
  const lowStockDiv = document.getElementById('lowStockList');
  const todaySalesSpan = document.getElementById('todaySales');
  const todayProfitSpan = document.getElementById('todayProfit');
  const productListPosDiv = document.getElementById('productListPos');
  const searchInput = document.getElementById('searchProduct');
  const cartItemsDiv = document.getElementById('cartItems');
  const cartTotalSpan = document.getElementById('cartTotal');

  // Helper
  function showModal(id) { document.getElementById(id).classList.add('active'); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  window.closeModal = closeModal;

  // Load data from Firestore (using storeAdminId – the owner's ID)
  async function loadData() {
    if (!currentUser) return;
    const ownerId = storeAdminId;
    const prods = await db.collection('products').where('storeId', '==', ownerId).get();
    products = prods.docs.map(d => ({ id: d.id, ...d.data() }));
    lowStockItems = products.filter(p => p.stock <= (p.reorderLevel || 10));
    renderProductListPos();
    renderLowStock();
    updateDashboard();
    renderCart();
  }

  function renderProductListPos() {
    const term = searchInput?.value.toLowerCase() || '';
    const filtered = products.filter(p => p.name.toLowerCase().includes(term));
    productListPosDiv.innerHTML = filtered.map(p => `
      <div class="product-item" onclick="addToCart('${p.id}')">
        <div><strong>${p.name}</strong><br>₦${p.price} | Stock: ${p.stock}</div>
        <button class="icon-btn">➕</button>
      </div>
    `).join('');
  }

  function renderLowStock() {
    if (!lowStockItems.length) { lowStockDiv.innerHTML = '✅ All stocks above reorder level'; return; }
    lowStockDiv.innerHTML = lowStockItems.map(p => `<div class="alert-badge mb-1">⚠️ ${p.name} (${p.stock} left)</div>`).join('');
  }

  async function updateDashboard() {
    if (!currentUser) return;
    const ownerId = storeAdminId;
    const today = new Date().toISOString().slice(0,10);
    const salesSnap = await db.collection('sales').where('storeId', '==', ownerId).where('date', '==', today).get();
    let totalSales = 0, totalProfit = 0;
    salesSnap.forEach(d => { totalSales += d.data().amount; totalProfit += d.data().profit; });
    todaySalesSpan.innerText = formatMoney(totalSales);
    todayProfitSpan.innerText = formatMoney(totalProfit);
  }

  // POS cart
  function addToCart(productId) {
    const product = products.find(p => p.id === productId);
    if (!product || product.stock <= 0) return alert("Out of stock");
    const existing = cart.find(i => i.id === productId);
    if (existing) existing.qty++;
    else cart.push({ id: productId, name: product.name, price: product.price, qty: 1 });
    renderCart();
  }
  function removeFromCart(idx) { cart.splice(idx,1); renderCart(); }

  function renderCart() {
    if (!cart.length) { cartItemsDiv.innerHTML = '<div>Cart empty</div>'; cartTotalSpan.innerText = '₦0'; return; }
    let html = '';
    cart.forEach((item, idx) => {
      html += `<div class="cart-item">
        <div>${item.name}<br>₦${item.price} x ${item.qty}</div>
        <div><span>₦${item.price*item.qty}</span>
        <button onclick="removeFromCart(${idx})" class="icon-btn ml-2">🗑️</button></div>
      </div>`;
    });
    cartItemsDiv.innerHTML = html;
    const total = cart.reduce((s,i)=>s+(i.price*i.qty),0);
    cartTotalSpan.innerText = formatMoney(total);
  }

  async function checkout() {
    if (cart.length === 0) return alert("Cart empty");
    const total = cart.reduce((s,i)=>s+(i.price*i.qty),0);
    let profit = 0;
    for (let item of cart) {
      const prod = products.find(p => p.id === item.id);
      profit += (item.price - prod.cost) * item.qty;
    }
    const sale = {
      storeId: storeAdminId,
      userId: currentUser.uid,
      date: new Date().toISOString().slice(0,10),
      timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      items: cart.map(i => ({ id: i.id, name: i.name, qty: i.qty, price: i.price })),
      amount: total,
      profit: profit
    };
    await db.collection('sales').add(sale);
    for (let item of cart) {
      const prod = products.find(p => p.id === item.id);
      const newStock = prod.stock - item.qty;
      await db.collection('products').doc(item.id).update({ stock: newStock });
    }
    await loadData();
    cart = [];
    renderCart();
    await updateDashboard();
    generateReceipt(sale.items, total);
  }

  function generateReceipt(items, total) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y = 20;
    doc.setFontSize(16);
    doc.text(businessSettings?.name || "ShopLedger", 105, y, { align: "center" });
    y += 6;
    doc.setFontSize(9);
    if (businessSettings?.address) doc.text(businessSettings.address, 105, y, { align: "center" });
    y += 5;
    if (businessSettings?.phone) doc.text(`Tel: ${businessSettings.phone}`, 105, y, { align: "center" });
    y += 8;
    doc.setFontSize(10);
    doc.text(formatDateTime(), 105, y, { align: "center" });
    y += 8;
    doc.line(20, y, 190, y);
    y += 6;
    doc.text("Item", 20, y); doc.text("Qty", 85, y); doc.text("Price", 120, y); doc.text("Total", 160, y);
    y += 6;
    doc.line(20, y, 190, y);
    y += 4;
    for (let item of items) {
      const lineTotal = item.qty * item.price;
      doc.text(item.name.substring(0, 18), 20, y);
      doc.text(item.qty.toString(), 85, y);
      doc.text(`₦${item.price}`, 120, y);
      doc.text(`₦${lineTotal}`, 160, y);
      y += 6;
      if (y > 270) { doc.addPage(); y = 20; }
    }
    doc.line(20, y, 190, y);
    y += 8;
    doc.setFontSize(12);
    doc.text(`Total: ₦${total}`, 150, y);
    y += 12;
    doc.setFontSize(9);
    doc.text("ShopLedger · Developed by TeaJay Konsult Ltd", 105, y, { align: "center" });
    window.lastReceiptPdf = doc;
    let preview = `${businessSettings?.name || "ShopLedger"}\n${businessSettings?.address || ""}\n${businessSettings?.phone || ""}\n${formatDateTime()}\n${'-'.repeat(30)}\n`;
    for (let i of items) preview += `${i.name} x${i.qty} @₦${i.price} = ₦${i.qty*i.price}\n`;
    preview += `${'-'.repeat(30)}\nTotal: ₦${total}\nShopLedger · TeaJay Konsult`;
    document.getElementById('receiptPreview').innerText = preview;
    showModal('receiptModal');
  }

  function downloadReceipt() { if (window.lastReceiptPdf) window.lastReceiptPdf.save(`receipt_${Date.now()}.pdf`); else alert("No receipt"); }
  function shareReceiptWhatsApp() {
    const text = document.getElementById('receiptPreview').innerText;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
  }

  // Load business settings (for receipt)
  async function loadBusinessSettings() {
    if (!currentUser) return;
    const doc = await db.collection('settings').doc(storeAdminId).get();
    businessSettings = doc.exists ? doc.data() : null;
    // Update welcome section
    if (businessSettings) {
      welcomeDiv.innerHTML = `<img src="${businessSettings.logoURL || ''}" class="logo-preview" onerror="this.style.display='none'"> <strong>Welcome, Cashier</strong><br>${businessSettings.name}<br><span class="small-text">${formatDateTime()}</span>`;
    } else {
      welcomeDiv.innerHTML = `<div><strong>Welcome, Cashier</strong><br>${formatDateTime()}</div>`;
    }
  }

  // Event listeners
  searchInput?.addEventListener('input', () => renderProductListPos());
  document.getElementById('checkoutBtn').addEventListener('click', checkout);
  document.getElementById('downloadPdfBtn').addEventListener('click', downloadReceipt);
  document.getElementById('shareReceiptBtn').addEventListener('click', shareReceiptWhatsApp);

  // Initial load
  window.addEventListener('DOMContentLoaded', async () => {
    setupInstallButton();
    const loggedIn = await checkAuth(true);
    if (loggedIn && userRole === 'cashier') {
      await loadBusinessSettings();
      await loadData();
      setInterval(updateDashboard, 10000);
    } else if (loggedIn && userRole !== 'cashier') {
      window.location.href = 'admin.html';
    }
  });
</script>
</body>
</html>
